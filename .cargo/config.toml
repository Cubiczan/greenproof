###############################################################################
# GreenVerify AI — .cargo/config.toml
#
# Toolchain configuration required for ink! smart contract compilation.
# All contracts target wasm32-unknown-unknown via cargo-contract.
###############################################################################

# NOTE: ink! contracts are compiled to WebAssembly via `cargo contract build`,
# which selects wasm32-unknown-unknown itself. We intentionally do NOT force a
# default build target here so that plain `cargo check` / `cargo test` run
# against the host toolchain with the `std` feature enabled (the std feature
# pulls in native-only deps such as secp256k1 that cannot be cross-compiled
# to wasm32 with the system clang).

# Extra linker flags required by ink!'s Wasm output:
#   --import-memory  : import the WebAssembly memory (avoids a global allocator).
#   --export-table   : export the WebAssembly indirect-call table.
[target.wasm32-unknown-unknown]
rustflags = [
    "-C", "link-arg=--import-memory",
    "-C", "link-arg=--export-table",
]
